<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salih Yıldız CV Oluşturucu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f3f4f6;
      }
      /* Hide scrollbar for clean editor look */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .break-inside-avoid {
        page-break-inside: avoid;
        break-inside: avoid;
      }
      @media print {
        @page { 
          margin: 10mm; 
          size: A4;
        }
        body { 
          margin: 0; 
          padding: 0; 
          background: white; 
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
        /* Hide everything by default */
        body > * { display: none !important; }
        
        /* Only show the root and the print container */
        #root { display: block !important; }
        #root > div { display: block !important; } /* The main App div */
        
        /* Hide sidebar and editor panel */
        .w-64, .w-96 { display: none !important; }
        
        /* Reset the preview area container */
        .flex-1.bg-gray-200 {
          background: white !important;
          padding: 0 !important;
          margin: 0 !important;
          overflow: visible !important;
          display: block !important;
          position: static !important;
        }
        
        /* Reset scale and shadow on the preview wrapper */
        .scale-\[0\.85\] {
          transform: none !important;
          box-shadow: none !important;
          margin: 0 !important;
          width: 100% !important;
        }
        
        /* Ensure the CV content is visible */
        .print-container {
          display: block !important;
          width: 100% !important;
          max-width: none !important;
          min-height: auto !important;
          box-shadow: none !important;
          margin: 0 !important;
          padding: 0 !important;
        }
      }
    </style>
