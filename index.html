    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f3f4f6;
      }
      /* Hide scrollbar for clean editor look */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .break-inside-avoid {
        page-break-inside: avoid;
        break-inside: avoid;
      }
      @media print {
        @page { 
          margin: 0;
          size: auto;
        }
        body { 
          margin: 0; 
          padding: 0; 
          background: white; 
        }
        
        /* Hide everything by default */
        body * {
          visibility: hidden;
        }

        /* Show only the print area and its children */
        #print-area, #print-area * {
          visibility: visible;
        }

        /* Position the print area at the very top-left */
        #print-area {
          position: absolute;
          left: 0;
          top: 0;
          width: 100%;
          margin: 0;
          padding: 0;
          z-index: 9999;
        }

        /* CRITICAL: Reset the scale transform and shadow on the wrapper */
        /* We target the class used in App.tsx: scale-[0.85] */
        .scale-\[0\.85\] {
          transform: none !important;
          box-shadow: none !important;
          margin: 0 !important;
          padding: 0 !important;
          width: 100% !important;
        }

        /* Ensure no scrollbars interfere */
        .overflow-auto, .overflow-y-auto, .overflow-hidden {
          overflow: visible !important;
          height: auto !important;
        }
      }
    </style>
