<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salih Yıldız CV Oluşturucu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f3f4f6;
      }
      /* Hide scrollbar for clean editor look */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .break-inside-avoid {
        page-break-inside: avoid;
        break-inside: avoid;
      }
      @media print {
        @page { 
          margin: 0;
          size: A4;
        }
        
        html, body {
          width: 100%;
          height: auto !important;
          margin: 0 !important;
          padding: 0 !important;
          background: white !important;
          overflow: visible !important;
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
        }

        /* Hide UI elements */
        .w-64, .w-96, .p-4.border-b.bg-gray-50 {
          display: none !important;
        }

        /* Reset layout for print */
        #root {
          display: block !important;
          height: auto !important;
          width: 100% !important;
        }

        #root > div {
          display: block !important;
          height: auto !important;
          width: 100% !important;
          overflow: visible !important;
        }

        /* Target the preview area container */
        .flex-1.bg-gray-200 {
          background: white !important;
          padding: 0 !important;
          margin: 0 !important;
          display: block !important;
          overflow: visible !important;
          width: 100% !important;
        }

        /* Remove scaling and shadows */
        .scale-\[0\.85\], .shadow-2xl {
          transform: none !important;
          scale: 1 !important;
          box-shadow: none !important;
          margin: 0 !important;
          padding: 0 !important;
          width: 100% !important;
          display: block !important;
        }

        #print-area {
          width: 100% !important;
          margin: 0 !important;
          padding: 0 !important;
        }

        /* Ensure CVPreview takes full width and handles its own internal padding */
        .print-container {
          box-shadow: none !important;
          margin: 0 !important;
          width: 100% !important;
          max-width: none !important;
          min-height: 0 !important;
          padding: 15mm !important;
        }
      }
    </style>

}
