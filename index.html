    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f3f4f6;
      }
      /* Hide scrollbar for clean editor look */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .break-inside-avoid {
        page-break-inside: avoid;
        break-inside: avoid;
      }
      @media print {
        @page { 
          margin: 0;
          size: auto;
        }
        
        html, body {
          width: 100%;
          height: 100%;
          margin: 0 !important;
          padding: 0 !important;
          background: white;
        }

        /* Hide everything initially */
        body * {
          visibility: hidden;
        }

        /* Make print area and its children visible */
        #print-area, #print-area * {
          visibility: visible;
        }

        /* Reset all parent containers to ensure no layout interference */
        #root, 
        #root > div, 
        .flex-1, 
        .scale-\[0\.85\] {
          position: static !important;
          transform: none !important;
          width: 100% !important;
          height: auto !important;
          margin: 0 !important;
          padding: 0 !important;
          overflow: visible !important;
          display: block !important;
          flex: none !important;
          box-shadow: none !important;
        }

        /* Position the print area absolutely at the top left of the page */
        #print-area {
          position: absolute !important;
          left: 0 !important;
          top: 0 !important;
          width: 100% !important;
          margin: 0 !important;
          padding: 0 !important;
          z-index: 9999;
        }
        
        /* Hide sidebar explicitly */
        .w-64, .w-96 {
          display: none !important;
        }
      }
    </style>
